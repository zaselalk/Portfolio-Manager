<!DOCTYPE html>
<html data-bs-theme="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Porfolio</title>
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/Work%20Sans.css">
    <link rel="stylesheet" href="assets/fonts/fontawesome-all.min.css">
    <link rel="stylesheet" href="assets/fonts/font-awesome.min.css">
    <link rel="stylesheet" href="assets/fonts/fontawesome5-overrides.min.css">
    <link rel="stylesheet" href="assets/css/bs-theme-overrides.css">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
    <header>
        <div data-bss-parallax-bg="true" style="height: 600px;background: url(&quot;assets/img/header.jpeg&quot;) center / cover;">
            <div class="container d-flex flex-column justify-content-end align-items-start">
                <h1 class="display-2 fw-bold" style="color: var(--bs-primary-bg-subtle);"><span style="color: rgb(255, 254, 254);">John Andrews</span></h1>
                <p class="fs-3 text-badge" style="color: var(--bs-primary);">Front-end and UX Designer</p>
            </div>
        </div>
    </header>
    <main>
        <section>
            <div class="container">
                <p class="fs-3">I am John. I am an experienced front-end designer. I help companies reinvent themselves through beautiful and expressive UI.</p>
                <ul class="list-inline fs-3">
                    <li class="list-inline-item"><i class="fa fa-facebook"></i></li>
                    <li class="list-inline-item"><i class="fa fa-twitter"></i></li>
                    <li class="list-inline-item"><i class="fa fa-youtube-play"></i></li>
                </ul>
            </div>
        </section>
        <section>
            <div class="container">
                <div class="banner" style="padding: 2em 1em;text-align: center;background: var(--bs-primary);border-radius: 10px;">
                    <p class="fs-3">I am currently <strong>available</strong> for hire.</p><button class="btn btn-primary text-uppercase fs-5" type="button" style="background: var(--bs-dark-text-emphasis);">Hire Me<i class="fas fa-chevron-right" style="padding-right: 0px;padding-left: 7px;"></i></button>
                </div>
            </div>
        </section>
        <section>
            <div class="container">
                <h1>Projects</h1>
                <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 projects-list">
                    <div class="col">
                        <div class="card"><img class="card-img w-100 d-block" src="assets/img/project-1.png">
                            <div class="card-img-overlay"></div>
                        </div>
                    </div>
                    <div class="col">
                        <div class="card"><img class="card-img w-100 d-block" src="assets/img/project-2.png">
                            <div class="card-img-overlay"></div>
                        </div>
                    </div>
                    <div class="col">
                        <div class="card"><img class="card-img w-100 d-block" src="assets/img/project-3.png">
                            <div class="card-img-overlay"></div>
                        </div>
                    </div>
                    <div class="col">
                        <div class="card"><img class="card-img w-100 d-block" src="assets/img/project-3.png">
                            <div class="card-img-overlay"></div>
                        </div>
                    </div>
                    <div class="col">
                        <div class="card"><img class="card-img w-100 d-block" src="assets/img/project-3.png">
                            <div class="card-img-overlay"></div>
                        </div>
                    </div>
                    <div class="col">
                        <div class="card"><img class="card-img w-100 d-block" src="assets/img/project-3.png">
                            <div class="card-img-overlay"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer style="/*--bs-body-bg: var(--bs-primary-border-subtle);*/">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <div class="text-start">
                        <p class="fs-4">Crafted by John Andrews</p>
                        <p>Made with ❤️ in Canada</p>
                    </div>
                </div>
                <div class="col-md-6">
                    <ul class="list-inline fs-3 text-center text-md-start d-flex justify-content-center align-items-center justify-content-md-start justify-content-lg-start">
                        <li class="list-inline-item" style="margin: 4px;"><i class="fa fa-facebook" style="margin: 4px;"></i></li>
                        <li class="list-inline-item" style="margin: 4px;"><i class="fa fa-twitter" style="margin: 4px;"></i></li>
                        <li class="list-inline-item" style="margin: 4px;"><i class="fa fa-youtube-play" style="margin: 4px;"></i></li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>
    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="assets/js/bs-init.js"></script>
</body>

</html>
